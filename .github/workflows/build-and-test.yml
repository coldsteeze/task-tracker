name: Build and Test

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: task-tracker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      keycloak:
        image: quay.io/keycloak/keycloak:latest
        env:
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
          KC_DB: dev-file
          KC_HOSTNAME_STRICT: "false"
          KC_HOSTNAME: localhost
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health/live || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
        command: start-dev


    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres is up" && break
            echo "Waiting for postgres..."
            sleep 3
          done

      - name: Wait for Keycloak to be ready
        run: |
          for i in {1..10}; do
            nc -z localhost 8080 && echo "Keycloak is up" && break
            echo "Waiting for Keycloak..."
            sleep 5
          done

      - name: Build and test
        run: mvn clean install