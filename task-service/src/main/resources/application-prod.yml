spring:
  datasource:
    url: jdbc:postgresql://task_postgres:5432/${TASK_SERVICE_POSTGRES_DB:task_db}
    username: ${TASK_SERVICE_POSTGRES_USER:postgres}
    password: ${TASK_SERVICE_POSTGRES_PASSWORD:postgres}

  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVERS}

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL}
  realm-resource: ${KEYCLOAK_REALM}

app:
  kafka:
    topics:
      task-created: ${TASK_CREATED_TOPIC}
      task-status-changed: ${TASK_STATUS_CHANGED_TOPIC}
